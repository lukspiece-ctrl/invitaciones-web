<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear invitación</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body data-page="create">
  <main class="container editor-layout create-layout">
    <section class="editor-panel">
      <div class="panel-heading">
        <div>
          <p class="eyebrow">Nuevo diseño</p>
          <h1>Crear invitación</h1>
        </div>
      </div>

      <form id="invitationEditorForm" class="editor-form">
        <div class="form-grid">
          <label>
            URL personalizada
            <input type="text" name="slug" required placeholder="lidia32">
          </label>

          <label>
            Título
            <input type="text" name="titulo" required>
          </label>

          <label>
            Nombre
            <input type="text" name="nombre" placeholder="Lidia Benítez">
          </label>

          <label>
            Edad
            <input type="number" name="edad" min="0" placeholder="32">
          </label>

          <label>
            Tipo de evento
            <input type="text" name="tipo" required placeholder="Boda, cumpleaños, bautismo">
          </label>

          <label>
            Anfitrión
            <input type="text" name="anfitrion" required>
          </label>

          <label>
            Fecha
            <input type="date" name="fecha" required>
          </label>

          <label>
            Hora
            <input type="time" name="hora" required>
          </label>

          <label>
            Lugar
            <input type="text" name="lugar" required>
          </label>

          <label>
            Dirección
            <input type="text" name="direccion" required>
          </label>

          <label>
            Teléfono
            <input type="tel" name="telefono" placeholder="+595...">
          </label>

          <label>
            Link de Google Maps
            <input type="url" name="googleMapsUrl" placeholder="https://maps.google.com/...">
          </label>

          <label>
            Contraseña de administrador
            <input type="text" name="adminPassword" required>
          </label>

          <label class="full-field">
            Descripción
            <input type="text" name="descripcion" placeholder="Texto corto para la invitación">
          </label>
        </div>

        <p class="public-url-preview">
          URL pública:
          <strong id="createPublicUrl">invitacion.html?id=</strong>
        </p>

        <section class="media-template-panel">
          <div class="panel-heading small-heading">
            <div>
              <p class="eyebrow">Plantilla e imágenes</p>
              <h2>Personalización visual</h2>
            </div>
          </div>

          <div class="form-grid">
            <label>
              Plantilla
              <select name="plantilla" id="templateSelect">
                <option value="premium-floral">Premium floral</option>
                <option value="infantil">Infantil</option>
                <option value="elegante-oscura">Elegante oscura</option>
                <option value="minimalista">Minimalista</option>
                <option value="foto-principal">Foto principal</option>
                <option value="baby-shower">Baby Shower</option>
                <option value="boda">Boda</option>
              </select>
            </label>

            <label>
              Foto principal por URL
              <input type="url" name="fotoPrincipal" placeholder="https://.../foto.jpg">
            </label>

            <label>
              Imagen de fondo por URL
              <input type="url" name="imagenFondo" placeholder="https://.../fondo.jpg">
            </label>

            <label>
              Imagen decorativa por URL
              <input type="url" name="imagenDecorativa" placeholder="https://.../flores.png">
            </label>

            <label>
              Subir foto principal
              <input type="file" id="fotoPrincipalFile" accept="image/*">
              <input type="hidden" name="fotoPrincipalBase64">
            </label>

            <label>
              Subir imagen de fondo
              <input type="file" id="imagenFondoFile" accept="image/*">
              <input type="hidden" name="imagenFondoBase64">
            </label>

            <label>
              Subir imagen decorativa
              <input type="file" id="imagenDecorativaFile" accept="image/*">
              <input type="hidden" name="imagenDecorativaBase64">
            </label>
          </div>

          <div class="image-preview-grid">
            <figure>
              <span>Foto principal</span>
              <img id="fotoPrincipalPreview" src="" alt="Vista previa de foto principal">
            </figure>

            <figure>
              <span>Fondo</span>
              <img id="imagenFondoPreview" src="" alt="Vista previa de imagen de fondo">
            </figure>

            <figure>
              <span>Decoración</span>
              <img id="imagenDecorativaPreview" src="" alt="Vista previa de imagen decorativa">
            </figure>
          </div>

          <div class="template-help">
            <p>
              Variables disponibles para imágenes:
              <code>{{fotoPrincipal}}</code>,
              <code>{{imagenFondo}}</code>,
              <code>{{imagenDecorativa}}</code>,
              <code>{{plantilla}}</code>
            </p>
          </div>
        </section>

        <div class="code-editor-stack">
          <label>
            HTML personalizado
            <textarea class="code-textarea" name="customHtml" rows="16" required placeholder="<h1>{{nombre}}</h1>"></textarea>
          </label>

          <label>
            CSS personalizado
            <textarea class="code-textarea" name="customCss" rows="12" placeholder=".titulo { color: #333; }"></textarea>
          </label>

          <label>
            JavaScript personalizado
            <textarea class="code-textarea" name="customJs" rows="10" placeholder="console.log('{{nombre}}');"></textarea>
          </label>
        </div>

        <div class="button-row">
          <button class="button secondary" id="previewButton" type="button">Vista previa</button>
          <button class="button secondary" id="copyCreatePublicLinkButton" type="button">Copiar enlace público</button>
          <button class="button primary" type="submit">Guardar invitación</button>
        </div>

        <p id="editorMessage" class="success-message" role="status"></p>
      </form>
    </section>

    <aside class="preview-panel">
      <div class="panel-heading">
        <div>
          <p class="eyebrow">Preview</p>
          <h2>Vista previa</h2>
        </div>
      </div>

      <iframe id="customPreview" class="custom-preview-iframe" title="Vista previa de invitación"></iframe>
    </aside>
  </main>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>

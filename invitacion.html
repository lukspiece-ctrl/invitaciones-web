<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invitación K-Pop Mágica</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body data-page="invitation" class="public-invitation-body invitation-only-page">

  <main class="scene">
    <section class="magic-card" id="magicCard" aria-label="Invitación K-Pop">

      <div class="video-camera">
        <img
          src="assets/img/invitacion-kpop.png"
          class="bg-img"
          alt="Invitación K-Pop">
      </div>

      <div class="party-lights">
        <div class="spot spot-1"></div>
        <div class="spot spot-2"></div>
        <div class="spot spot-3"></div>
        <div class="spot spot-4"></div>
        <div class="spot spot-5"></div>
        <div class="spot spot-6"></div>
      </div>

      <div class="dance-floor-flash"></div>
      <div class="soft-pink-filter"></div>
      <div class="cinematic-vignette"></div>

      <div class="aurora aurora-1"></div>
      <div class="aurora aurora-2"></div>

      <div class="smoke smoke-1"></div>
      <div class="smoke smoke-2"></div>

      <div class="shine"></div>
      <div class="sparkles"></div>
      <div class="confetti-layer"></div>

      <div class="invitation-text">
        <p class="small-title">Estás invitado a celebrar</p>

        <h1>Ana</h1>

        <p class="subtitle">Una fiesta mágica estilo K-Pop</p>

        <div class="info-box">
          <p><strong>Fecha:</strong> 20 de julio</p>
          <p><strong>Hora:</strong> 17:00 hs</p>
          <p><strong>Lugar:</strong> Salón Magic Party</p>
        </div>

        <a href="#rsvp-section" class="confirm-btn">
          Confirmar asistencia
        </a>
      </div>

    </section>

    <section id="rsvp-section" class="rsvp-section">
      <div class="rsvp-card">
        <p class="small-title">RSVP</p>
        <h2>Confirmar asistencia</h2>

        <form id="rsvpForm" class="rsvp-form">
          <label>
            Nombre
            <input type="text" name="nombre" autocomplete="name" required>
          </label>

          <label>
            Teléfono
            <input type="tel" name="telefono" autocomplete="tel" required>
          </label>

          <fieldset>
            <legend>¿Asiste?</legend>

            <div class="radio-row">
              <label>
                <input type="radio" name="asiste" value="Sí" checked>
                Sí
              </label>

              <label>
                <input type="radio" name="asiste" value="No">
                No
              </label>
            </div>
          </fieldset>

          <label>
            Cantidad de acompañantes
            <input type="number" name="acompanantes" min="0" value="0">
          </label>

          <label>
            Mensaje
            <textarea name="mensaje" rows="4" placeholder="Dejá un mensaje para los anfitriones"></textarea>
          </label>

          <button type="submit" class="rsvp-submit">
            Confirmar asistencia
          </button>

          <p id="successMessage" class="success-message" role="status"></p>
        </form>
      </div>
    </section>
  </main>

  <button id="floatingRsvpButton" class="floating-rsvp-button" type="button">
    Confirmar asistencia
  </button>

  <script src="assets/js/app.js"></script>
</body>
</html>
